<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Секретная игра</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f7f7f7;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: white;
    }
  </style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== SCALE =====
const BASE_WIDTH = 800;
const scale = () => window.innerWidth / BASE_WIDTH;

// ===== CANVAS FIX (IMPORTANT) =====
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// ===== SETTINGS =====
const isAnya = Math.random() >= 0.5;
const SCORE_FOR_WIN = 100;

const PLAYER_IMAGE_SRC = isAnya ? "./ann.png" : "./ilya.png";
const DEAD_IMAGE_SRC = "./dinofail.jpg";
const CACTUS_IMAGE_SRC = "./cactus2.png";
const MUSIC_SRC = isAnya ? "./ann.mp3" : "./ilya.mp3";

// ===== ASSETS =====
const playerImg = new Image();
const deadImg = new Image();
const cactusImg = new Image();
const music = new Audio(MUSIC_SRC);
music.loop = true;

// ===== WORLD =====
const groundY = () => window.innerHeight * 0.8;

// ===== PLAYER =====
const playerSize = () => Math.max(50, 70 * scale());

let player = {
  x: 50,
  y: 0,
  w: playerSize(),
  h: playerSize(),
  vy: 0,
  jumping: false
};

// старт на земле
player.y = groundY() - player.h;

//hack
const isDesktop = navigator.userAgent.includes("Windows") || navigator.userAgent.includes("Macintosh");
let gravity = isDesktop ? 0.25 * scale() : 0.65 * scale(); //0.6
let speed = isDesktop ? 9 : 6; //6
let frame = 0;
let score = 0;
let gameOver = false;
let obstacles = [];
const k = isDesktop ? -14 : -12;

// ===== JUMP =====
function jump() {
  if (gameOver){
    location.reload();
  }
  if (!player.jumping && !gameOver) {
    player.vy = k*scale(); //-12*scale()
    player.jumping = true;
    music.play().catch(() => {});
  }
}

document.addEventListener("keydown", jump);
document.addEventListener("mousedown", jump);
document.addEventListener("pointerdown", jump);

document.addEventListener("touchstart", (e) => {
  e.preventDefault();
  jump();
}, { passive: false });

// ===== OBSTACLES =====
function spawnObstacle() {
  const size = 60 * scale();

  obstacles.push({
    x: window.innerWidth,
    y: groundY() - size,
    w: size * 0.6,
    h: size
  });
}

// ===== COLLISION =====
function isColliding(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// ===== UPDATE =====
function update() {
  if (gameOver) return;

  frame++;

  if (frame % 10 === 0) score++;
  if (frame % 100 === 0) spawnObstacle();

  if (score >= SCORE_FOR_WIN) gameOver = true;

  // physics
  player.vy += gravity;
  player.vy = Math.max(-18, Math.min(player.vy, 20));
  player.y += player.vy;

  const ground = groundY() - player.h;

  if (player.y >= ground) {
    player.y = ground;
    player.vy = 0;
    player.jumping = false;
  }

  // obstacles movement
  obstacles.forEach(o => o.x -= speed);

  // collision
  for (const o of obstacles) {
    if (isColliding(player, o)) {
      gameOver = true;
      music.pause();
    }
  }

  obstacles = obstacles.filter(o => o.x + o.w > 0);
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const ground = groundY();

  // ground line
  ctx.fillStyle = "#ccc";
  ctx.fillRect(0, ground, window.innerWidth, 3);

  // player
  const img = gameOver ? deadImg : playerImg;

  if (img.complete) {
    ctx.drawImage(img, player.x, player.y, player.w, player.h);
  }

  // obstacles
  obstacles.forEach(o => {
    if (cactusImg.complete) {
      ctx.drawImage(cactusImg, o.x, o.y, o.w, o.h);
    }
  });

  // score
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 20, 30);

  if (gameOver) {
    ctx.font = "40px Arial";
    ctx.fillStyle = "red";
    const text = score < SCORE_FOR_WIN ? "ПОМЕР" : "ПОБЕДИЛ";
    ctx.fillText(text, window.innerWidth / 2 - 120, window.innerHeight / 2);
  }
}

// ===== LOOP =====
function loop() {
  if (gameOver) {
    music.pause();
    music.currentTime = 0;

    if (score >= SCORE_FOR_WIN) {
      alert('Вы выиграли!\nСкажи код "Победитель" невесте или жениху и получи приз :)');
    }
    return;
  }

  update();
  draw();
  requestAnimationFrame(loop);
}

// ===== LOAD ASSETS =====
let loaded = 0;
const total = 3;

function checkStart() {
  loaded++;
  if (loaded === total){
    const firstRun = localStorage.getItem("firstRun") === null;
    if (firstRun) {
      alert("Совет: победить проще держа телефон горизонтально");
      localStorage.setItem("firstRun", "true");
    }
    loop();
  }
}

[playerImg, deadImg, cactusImg].forEach(img => {
  img.onload = checkStart;
});

playerImg.src = PLAYER_IMAGE_SRC;
deadImg.src = DEAD_IMAGE_SRC;
cactusImg.src = CACTUS_IMAGE_SRC;

</script>
</body>
</html>
